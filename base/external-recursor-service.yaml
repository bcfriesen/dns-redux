# base/external-recursor-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: pdns-recursor-external
  namespace: dns-system
spec:
  type: LoadBalancer
  ports:
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53
  selector:
    app: pdns-recursor-external
