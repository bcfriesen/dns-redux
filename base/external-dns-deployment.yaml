# base/external-dns-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: external-dns
  namespace: dns-system
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: external-dns
  template:
    metadata:
      labels:
        app: external-dns
    spec:
      serviceAccountName: external-dns
      containers:
      - name: external-dns
        image: registry.k8s.io/external-dns/external-dns:v0.14.0
        args:
        - --source=service
        - --source=ingress
        - --source=node
        - --provider=pdns
        - --pdns-server=http://pdns-auth.dns-system.svc.cluster.local:8081
        - --pdns-api-key=super-secret-api-key
        - --domain-filter=internal.system.domain
        - --registry=txt
        - --txt-owner-id=k8s-cluster
