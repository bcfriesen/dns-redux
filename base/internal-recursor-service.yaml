# base/internal-recursor-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: pdns-recursor-internal
  namespace: dns-system
  annotations:
    # This tells GKE to provision a private IP, not a public one
    networking.gke.io/load-balancer-type: "Internal"
spec:
  type: LoadBalancer
  ports:
    - name: dns-tcp
      port: 53
      protocol: TCP
      targetPort: 53
    - name: dns-udp
      port: 53
      protocol: UDP
      targetPort: 53
  selector:
    app: pdns-recursor-internal
