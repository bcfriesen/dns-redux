# base/network-policies.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: dns-system
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-auth
  namespace: dns-system
spec:
  podSelector:
    matchLabels:
      app: pdns-postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: pdns-authoritative
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-from-internal-and-api
  namespace: dns-system
spec:
  podSelector:
    matchLabels:
      app: pdns-authoritative
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: pdns-recursor-internal
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  - from:
    - podSelector:
        matchLabels:
          app: external-dns
    ports:
    - protocol: TCP
      port: 8081
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-recursor-ingress
  namespace: dns-system
spec:
  podSelector:
    matchLabels:
      app: pdns-recursor-internal
  policyTypes:
  - Ingress
  ingress:
  - from:
    - ipBlock:
        # Only allow RFC 1918 internal subnets to hit the internal recursor
        cidr: 10.0.0.0/8
    - ipBlock:
        cidr: 172.16.0.0/12
    - ipBlock:
        cidr: 192.168.0.0/16
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-external-recursor-ingress
  namespace: dns-system
spec:
  podSelector:
    matchLabels:
      app: pdns-recursor-external
  policyTypes:
  - Ingress
  ingress:
  - ports:
    # Allow all traffic to hit the external recursor
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
