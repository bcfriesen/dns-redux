# base/network-policies.yaml
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: dns-system
spec:
  podSelector: {}
  policyTypes:
  - Ingress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-postgres-from-auth
  namespace: dns-system
spec:
  podSelector:
    matchLabels:
      app: pdns-postgres
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: pdns-authoritative
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-recursor-ingress
  namespace: dns-system
spec:
  podSelector:
    matchLabels:
      app: pdns-recursor
  policyTypes:
  - Ingress
  ingress:
  - from:
    # 1. NEW: Explicitly allow ALL pods from ANY namespace inside the cluster
    - namespaceSelector: {}
      podSelector: {}
    # 2. RETAIN: Allow external private endpoints (on-prem networks, hardware nodes)
    - ipBlock:
        cidr: 10.0.0.0/8
    - ipBlock:
        cidr: 172.16.0.0/12
    - ipBlock:
        cidr: 192.168.0.0/16
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-auth-traffic
  namespace: dns-system
spec:
  podSelector:
    matchLabels:
      app: pdns-authoritative
  policyTypes:
  - Ingress
  ingress:
  # Allow the single recursor to send forwarded queries
  - from:
    - podSelector:
        matchLabels:
          app: pdns-recursor
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow external-dns to manage records via API
  - from:
    - podSelector:
        matchLabels:
          app: external-dns
    ports:
    - protocol: TCP
      port: 8081
  # Allow upstream DNS servers to perform AXFR/IXFR zone transfers
  - from:
    - ipBlock:
        cidr: 0.0.0.0/0 # Restrict this to your specific upstream provider DNS IPs in production
    ports:
    - protocol: TCP
      port: 53
